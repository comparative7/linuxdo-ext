<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinuxDo Auto-Browser</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .status.running {
      color: #2e7d32;
    }

    .status.resting {
      color: #e65100;
    }

    .status.waiting {
      color: #1565c0;
    }

    .history {
      margin-bottom: 12px;
      padding: 8px 10px;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 8px;
      font-size: 12px;
      color: #444;
    }

    .history summary {
      cursor: pointer;
      font-weight: 600;
      color: #555;
    }

    .history-list {
      margin-top: 8px;
      max-height: 160px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      display: block;
      padding: 4px 0;
      color: #4a90d9;
      text-decoration: none;
      line-height: 1.35;
      border-bottom: 1px solid #f0f0f0;
    }

    .history-item:hover {
      text-decoration: underline;
    }

    .history-item .meta {
      color: #999;
      font-size: 11px;
    }

    .history-empty {
      color: #999;
      padding: 6px 0;
    }

    .history-clear {
      margin-top: 8px;
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fafafa;
      color: #666;
      font-size: 12px;
      cursor: pointer;
    }

    .history-clear:hover {
      background: #f0f0f0;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btn-start {
      background: #4a90d9;
      color: #fff;
    }

    #btn-start:hover:not(:disabled) {
      background: #3a7bc8;
    }

    #btn-stop {
      background: #e0e0e0;
      color: #333;
    }

    #btn-stop:hover:not(:disabled) {
      background: #d0d0d0;
    }

    .secondary-actions {
      margin-top: 8px;
    }

    #btn-open-home {
      width: 100%;
      flex: none;
      background: #fff;
      color: #4a90d9;
      border: 1px solid #c5d9f0;
    }

    #btn-open-home:hover {
      background: #f0f6fc;
    }

    #btn-skip-pause {
      width: 100%;
      flex: none;
      background: #fff8e1;
      color: #e65100;
      border: 1px solid #ffe0b2;
    }

    #btn-skip-pause:hover:not(:disabled) {
      background: #ffecb3;
    }

    #btn-skip-pause:disabled {
      background: #f5f5f5;
      color: #aaa;
      border-color: #e0e0e0;
    }

    #btn-open-options {
      width: 100%;
      flex: none;
      background: #fff;
      color: #555;
      border: 1px solid #e0e0e0;
    }

    #btn-open-options:hover {
      background: #f5f5f5;
    }

    #btn-reset-daily-count {
      width: 100%;
      flex: none;
      background: #fff;
      color: #555;
      border: 1px solid #e0e0e0;
    }

    #btn-reset-daily-count:hover:not(:disabled) {
      background: #f5f5f5;
    }

    .hint {
      margin-top: 12px;
      font-size: 11px;
      color: #999;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>LinuxDo Bot</h1>
  <p id="status" class="status">已停止</p>

  <details class="history" id="history-panel">
    <summary>今日足迹 (<span id="history-count">0</span>)</summary>
    <div id="history-list" class="history-list"></div>
    <button id="btn-clear-history" type="button" class="history-clear">清空今日</button>
  </details>

  <div class="actions">
    <button id="btn-start" type="button">开始</button>
    <button id="btn-stop" type="button" disabled>停止</button>
  </div>
  <div class="secondary-actions">
    <button id="btn-skip-pause" type="button" disabled>跳过休息</button>
  </div>
  <div class="secondary-actions">
    <button id="btn-reset-daily-count" type="button" disabled>重置今日帖数</button>
  </div>
  <div class="secondary-actions">
    <button id="btn-open-options" type="button">设置</button>
  </div>
  <div class="secondary-actions">
    <button id="btn-open-home" type="button">打开 LinuxDo 主页</button>
  </div>
  <p class="hint">请在 LinuxDo 帖子列表页使用 · 详细说明见「设置」</p>
  <script src="../scripts/utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
