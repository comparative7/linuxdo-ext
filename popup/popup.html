<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinuxDo Auto-Browser</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 220px;
      padding: 16px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      background: #fafafa;
    }

    h1 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status {
      font-size: 12px;
      color: #666;
      margin-bottom: 14px;
    }

    .status.running {
      color: #2e7d32;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    #btn-start {
      background: #4a90d9;
      color: #fff;
    }

    #btn-start:hover:not(:disabled) {
      background: #3a7bc8;
    }

    #btn-stop {
      background: #e0e0e0;
      color: #333;
    }

    #btn-stop:hover:not(:disabled) {
      background: #d0d0d0;
    }

    .hint {
      margin-top: 12px;
      font-size: 11px;
      color: #999;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>LinuxDo Bot</h1>
  <p id="status" class="status">已停止</p>
  <div class="actions">
    <button id="btn-start" type="button">开始</button>
    <button id="btn-stop" type="button" disabled>停止</button>
  </div>
  <p class="hint">请在 LinuxDo 帖子列表页使用</p>
  <script src="../scripts/utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
